<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
    <linearGradient id="nose" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="flame1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffdd00"/>
      <stop offset="60%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ff2200"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffee55"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <radialGradient id="window" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#c4f0ff"/>
      <stop offset="60%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer flame (large) -->
  <path d="M50 95 C50 95 38 80 40 72 L50 78 L60 72 C62 80 50 95 50 95Z"
        fill="url(#flame1)" opacity="0.9" filter="url(#glow)">
    <animate attributeName="d"
      values="M50 95 C50 95 38 80 40 72 L50 78 L60 72 C62 80 50 95 50 95Z;
              M50 98 C50 98 36 82 40 72 L50 76 L60 72 C64 82 50 98 50 98Z;
              M50 95 C50 95 38 80 40 72 L50 78 L60 72 C62 80 50 95 50 95Z"
      dur="0.3s" repeatCount="indefinite"/>
  </path>

  <!-- Inner flame (small, bright) -->
  <path d="M50 88 C50 88 43 79 45 74 L50 77 L55 74 C57 79 50 88 50 88Z"
        fill="url(#flame2)" opacity="0.95">
    <animate attributeName="d"
      values="M50 88 C50 88 43 79 45 74 L50 77 L55 74 C57 79 50 88 50 88Z;
              M50 90 C50 90 42 80 45 74 L50 76 L55 74 C58 80 50 90 50 90Z;
              M50 88 C50 88 43 79 45 74 L50 77 L55 74 C57 79 50 88 50 88Z"
      dur="0.2s" repeatCount="indefinite"/>
  </path>

  <!-- Left fin -->
  <path d="M40 68 L28 78 L32 65 L40 58Z" fill="#cc0000" stroke="#ff4444" stroke-width="0.8"/>

  <!-- Right fin -->
  <path d="M60 68 L72 78 L68 65 L60 58Z" fill="#cc0000" stroke="#ff4444" stroke-width="0.8"/>

  <!-- Rocket body -->
  <path d="M50 8 C50 8 36 22 36 50 L36 70 C36 73 40 75 50 75 C60 75 64 73 64 70 L64 50 C64 22 50 8 50 8Z"
        fill="url(#body)" stroke="#999999" stroke-width="1.2"/>

  <!-- Red stripe -->
  <path d="M42 30 L42 70 C42 72 46 73 50 73 C54 73 58 72 58 70 L58 30Z"
        fill="rgba(204,0,0,0.15)" stroke="none"/>

  <!-- Body highlight streak -->
  <path d="M44 20 C44 20 41 35 41 55 L41 68"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nose cone -->
  <path d="M50 8 C50 8 42 18 40 28 L50 14 L60 28 C58 18 50 8 50 8Z"
        fill="url(#nose)" opacity="0.9"/>

  <!-- Window -->
  <circle cx="50" cy="40" r="8" fill="url(#window)" stroke="#dddddd" stroke-width="1.8"/>
  <!-- Window glare -->
  <ellipse cx="47" cy="37" rx="3" ry="2" fill="rgba(255,255,255,0.6)" transform="rotate(-20 47 37)"/>

  <!-- Bottom ring / nozzle -->
  <ellipse cx="50" cy="73" rx="12" ry="3" fill="#555555" stroke="#888888" stroke-width="1"/>

  <!-- Sparkle accents -->
  <circle cx="30" cy="20" r="1.2" fill="#ffdd00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="72" cy="30" r="1" fill="#ffdd00" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="55" r="0.8" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
