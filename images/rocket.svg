<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rocket Body -->
  <defs>
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Flames -->
  <ellipse cx="50" cy="85" rx="8" ry="15" fill="#fbbf24" opacity="0.8">
    <animate attributeName="ry" values="15;20;15" dur="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="0.3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="50" cy="85" rx="5" ry="12" fill="#ef4444" opacity="0.9">
    <animate attributeName="ry" values="12;16;12" dur="0.25s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Rocket Fins -->
  <path d="M 35 70 L 25 85 L 35 80 Z" fill="#1e40af" opacity="0.8"/>
  <path d="M 65 70 L 75 85 L 65 80 Z" fill="#1e40af" opacity="0.8"/>
  
  <!-- Main Body -->
  <ellipse cx="50" cy="45" rx="18" ry="35" fill="url(#rocketGrad)" filter="url(#glow)"/>
  
  <!-- Nose Cone -->
  <path d="M 50 10 L 32 30 L 68 30 Z" fill="#3b82f6" filter="url(#glow)"/>
  
  <!-- Window -->
  <circle cx="50" cy="40" r="8" fill="url(#windowGrad)" opacity="0.95"/>
  <circle cx="50" cy="40" r="6" fill="#0c4a6e" opacity="0.3"/>
  
  <!-- Details -->
  <rect x="48" y="55" width="4" height="8" rx="2" fill="#1e40af" opacity="0.6"/>
  <circle cx="50" cy="35" r="2" fill="#dbeafe" opacity="0.8"/>
</svg>
