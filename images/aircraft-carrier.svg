<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 60" width="150" height="60">
  <defs>
    <linearGradient id="deckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4b5563;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <filter id="carrierglow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Hull (bottom) -->
  <path d="M 10 45 L 5 50 L 145 50 L 140 45 Z" fill="url(#hullGrad)" stroke="#111827" stroke-width="1"/>
  
  <!-- Deck (flight deck) -->
  <rect x="5" y="35" width="140" height="10" fill="url(#deckGrad)" filter="url(#carrierglow)" stroke="#1f2937" stroke-width="1.5"/>
  
  <!-- Deck Markings -->
  <line x1="15" y1="37" x2="25" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="37" x2="15" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  
  <line x1="35" y1="37" x2="45" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="37" x2="35" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  
  <line x1="55" y1="37" x2="95" y2="37" stroke="#fef3c7" stroke-width="3" stroke-linecap="round" stroke-dasharray="5,5"/>
  
  <line x1="105" y1="37" x2="115" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="115" y1="37" x2="105" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  
  <line x1="125" y1="37" x2="135" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="135" y1="37" x2="125" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Island/Tower -->
  <rect x="110" y="20" width="20" height="15" fill="#374151" stroke="#1f2937" stroke-width="1"/>
  <rect x="112" y="22" width="16" height="10" fill="#4b5563"/>
  
  <!-- Tower Windows -->
  <rect x="114" y="24" width="3" height="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="118" y="24" width="3" height="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="123" y="24" width="3" height="3" fill="#60a5fa" opacity="0.8"/>
  
  <!-- Radar Dish -->
  <ellipse cx="120" cy="18" rx="6" ry="2" fill="#6b7280" stroke="#374151" stroke-width="1">
    <animateTransform attributeName="transform" type="rotate" from="0 120 18" to="360 120 18" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Antenna -->
  <line x1="115" y1="20" x2="115" y2="15" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="115" cy="14" r="1.5" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Wave Effects -->
  <path d="M 0 50 Q 5 48, 10 50 T 20 50 T 30 50 T 40 50 T 50 50 T 60 50 T 70 50 T 80 50 T 90 50 T 100 50 T 110 50 T 120 50 T 130 50 T 140 50 T 150 50" 
        fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5">
    <animate attributeName="d" 
             values="M 0 50 Q 5 48, 10 50 T 20 50 T 30 50 T 40 50 T 50 50 T 60 50 T 70 50 T 80 50 T 90 50 T 100 50 T 110 50 T 120 50 T 130 50 T 140 50 T 150 50;
                     M 0 50 Q 5 52, 10 50 T 20 50 T 30 50 T 40 50 T 50 50 T 60 50 T 70 50 T 80 50 T 90 50 T 100 50 T 110 50 T 120 50 T 130 50 T 140 50 T 150 50;
                     M 0 50 Q 5 48, 10 50 T 20 50 T 30 50 T 40 50 T 50 50 T 60 50 T 70 50 T 80 50 T 90 50 T 100 50 T 110 50 T 120 50 T 130 50 T 140 50 T 150 50" 
             dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
