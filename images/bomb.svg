<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <radialGradient id="bombBody">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="fuseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#451a03;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sparkGrad">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </radialGradient>
    <filter id="bombglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Bomb Body -->
  <circle cx="30" cy="38" r="18" fill="url(#bombBody)" filter="url(#bombglow)" stroke="#000" stroke-width="1.5"/>
  
  <!-- Shine on Bomb -->
  <ellipse cx="24" cy="32" rx="6" ry="8" fill="#4b5563" opacity="0.5"/>
  
  <!-- Fuse -->
  <path d="M 30 20 Q 28 15, 30 10" fill="none" stroke="url(#fuseGrad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Fuse Detail Lines -->
  <line x1="28" y1="17" x2="27" y2="16" stroke="#451a03" stroke-width="1"/>
  <line x1="29" y1="14" x2="28" y2="12" stroke="#451a03" stroke-width="1"/>
  
  <!-- Animated Spark -->
  <circle cx="30" cy="10" r="4" fill="url(#sparkGrad)" filter="url(#bombglow)">
    <animate attributeName="r" values="3;5;3" dur="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="0.4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Spark Rays -->
  <g opacity="0.8">
    <line x1="30" y1="10" x2="26" y2="6" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="x2" values="26;24;26" dur="0.4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="6;4;6" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="30" y1="10" x2="34" y2="6" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="x2" values="34;36;34" dur="0.4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="6;4;6" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="30" y1="10" x2="30" y2="4" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="y2" values="4;2;4" dur="0.4s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Skull Symbol on Bomb -->
  <g transform="translate(30, 38)">
    <ellipse cx="0" cy="-2" rx="5" ry="6" fill="#dc2626" opacity="0.9"/>
    <circle cx="-2" cy="-3" r="1.5" fill="#111827"/>
    <circle cx="2" cy="-3" r="1.5" fill="#111827"/>
    <rect x="-2" y="1" width="4" height="2" fill="#111827" opacity="0.7"/>
  </g>
</svg>
