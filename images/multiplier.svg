<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <defs>
    <radialGradient id="coinGrad">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </radialGradient>
    <filter id="coinglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Coin Circle -->
  <circle cx="25" cy="25" r="22" fill="url(#coinGrad)" filter="url(#coinglow)" stroke="#d97706" stroke-width="2"/>
  
  <!-- Inner Circle Detail -->
  <circle cx="25" cy="25" r="18" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Multiplier Text -->
  <text x="25" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#92400e" text-anchor="middle">×</text>
  
  <!-- Shine Effect -->
  <ellipse cx="18" cy="18" rx="8" ry="6" fill="#fef3c7" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Rotating Sparkle -->
  <circle cx="25" cy="25" r="1.5" fill="#fef3c7" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="25;35;25;15;25" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="25;25;25;25;25" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
