<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <defs>
    <linearGradient id="planeBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planeWing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="planeglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Wings -->
  <ellipse cx="45" cy="50" rx="35" ry="8" fill="url(#planeWing)" opacity="0.9" filter="url(#planeglow)"/>
  
  <!-- Tail Wings -->
  <path d="M 15 45 L 8 38 L 15 40 Z" fill="#3b82f6" opacity="0.8"/>
  <path d="M 15 48 L 15 58 L 8 52 Z" fill="#2563eb" opacity="0.7"/>
  
  <!-- Fuselage -->
  <ellipse cx="50" cy="50" rx="45" ry="12" fill="url(#planeBody)" filter="url(#planeglow)"/>
  
  <!-- Nose -->
  <ellipse cx="90" cy="50" rx="15" ry="10" fill="#1e40af" filter="url(#planeglow)"/>
  <circle cx="95" cy="50" r="4" fill="#dbeafe" opacity="0.9"/>
  
  <!-- Cockpit Windows -->
  <ellipse cx="75" cy="48" rx="8" ry="5" fill="#0c4a6e" opacity="0.6"/>
  <ellipse cx="65" cy="49" rx="6" ry="4" fill="#0c4a6e" opacity="0.5"/>
  
  <!-- Engine Details -->
  <circle cx="35" cy="50" r="4" fill="#1e40af" opacity="0.7"/>
  <rect x="33" y="48" width="4" height="4" fill="#dbeafe" opacity="0.3"/>
  
  <!-- Speed Lines -->
  <line x1="10" y1="45" x2="5" y2="45" stroke="#60a5fa" stroke-width="1.5" opacity="0.6">
    <animate attributeName="x1" values="10;5;10" dur="0.5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="5;0;5" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="12" y1="50" x2="7" y2="50" stroke="#60a5fa" stroke-width="1.5" opacity="0.5">
    <animate attributeName="x1" values="12;7;12" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="7;2;7" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <line x1="10" y1="55" x2="5" y2="55" stroke="#60a5fa" stroke-width="1.5" opacity="0.6">
    <animate attributeName="x1" values="10;5;10" dur="0.4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="5;0;5" dur="0.4s" repeatCount="indefinite"/>
  </line>
</svg>
